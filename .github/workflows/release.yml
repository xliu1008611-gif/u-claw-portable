name: Build & Publish U-Claw Portable Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install runtime dependencies
        run: |
          cd app\runtime\node-win-x64
          if (Test-Path "package.json") { npm install } else { Write-Host "No package.json found in runtime, skipping npm install." }

      - name: Install core dependencies
        run: |
          cd app\core
          npm install

      - name: Create portable zip (includes node_modules)
        run: |
          $zip = "U-Claw-Portable-${{ github.ref_name }}.zip"
          $paths = @()
          $targets = @(
            "app\runtime\node-win-x64\node_modules",
            "app\core\node_modules",
            "app",
            "data",
            "config-server",
            "package.json",
            "LICENSE",
            "README.md"
          )
          foreach ($t in $targets) {
            if (Test-Path $t) { $paths += $t }
          }
          # Include any .bat or .ps1 scripts in root
          Get-ChildItem -Path . -Filter "*.bat" | ForEach-Object { $paths += $_.FullName }
          Get-ChildItem -Path . -Filter "*.ps1" | ForEach-Object { $paths += $_.FullName }
          Compress-Archive -Path $paths -DestinationPath $zip -Force -ErrorAction SilentlyContinue

      - name: Publish Release with zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "U-Claw Portable ${{ github.ref_name }}"
          files: U-Claw-Portable-${{ github.ref_name }}.zip
          generate_release_notes: true
